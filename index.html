
<!-- index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quizician</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Inter&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>


<!-- Navbar -->
<header class="navbar">
  <div class="logo">Quizician</div>
 
<nav>
  <a href="#" id="homeBtn">Home</a>
  <a href="#" id="quizBtn">Quizzes</a>
  <a href="#" id="catBtn">Categories</a>
</nav>


</header>

<!-- Username -->
<div style="text-align:center; margin-top:20px;">
  <input id="username" placeholder="Enter your name" />
</div>

<!-- Hero -->
<section class="hero">
  <div class="hero-text">
    <h1>Play Smart. Think Sharp.</h1>
    <p>Challenge yourself with exciting quizzes and boost your knowledge.</p>
    <button onclick="startQuiz()">Start Quiz</button>
  </div>
</section>

<!-- Categories -->
<section class="categories">
  <h2>Categories</h2>
  <div class="cards">

<div class="card" onclick="startQuiz('gk')">GK</div>
<div class="card" onclick="startQuiz('science')">Science</div>
<div class="card" onclick="startQuiz('history')">History</div>
<div class="card" onclick="startQuiz('gk')">Current Affairs</div>




  </div>
</section>


<section id="quiz" class="quiz-container" style="display:none;">
  
  <div class="quiz-header">
    <div id="progress">Question 1/3</div>
    <div id="timer">⏱ 10</div>
  </div>

  <h2 id="question"></h2>

  <div id="answers" class="answers"></div>

  <button id="nextBtn">Next</button>
</section>



<!-- Result Section -->

<section id="result" class="quiz-container" style="display:none;">
  <h2>📊 Quiz Result</h2>

  <p><strong>Score:</strong> <span id="score"></span></p>
  <p><strong>Accuracy:</strong> <span id="accuracy"></span></p>
  <p><strong>Total Time:</strong> <span id="timeTaken"></span> sec</p>

  <div id="review"></div>

  <button onclick="restartQuiz()">Play Again</button>
</section>







<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>


<script src="script.js"></script>
</body>
</html>
